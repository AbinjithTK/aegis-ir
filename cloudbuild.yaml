# Google Cloud Build — builds and deploys AEGIS-IR to Cloud Run
steps:
  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aegis-ir:$SHORT_SHA', '.']

  # Push to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aegis-ir:$SHORT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'aegis-ir'
      - '--image=gcr.io/$PROJECT_ID/aegis-ir:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--max-instances=5'
      - '--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=1,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1'
      - '--set-secrets=SPLUNK_TOKEN=splunk-token:latest,PHOENIX_API_KEY=phoenix-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/aegis-ir:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
