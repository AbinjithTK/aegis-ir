# Alembic Configuration for AEGIS-IR Enterprise Platform
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts relative to this file
script_location = src/sift_defender/enterprise/migrations

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames
truncate_slug_length = 40

# Set to 'true' to apply revision directives regardless of autogenerate changes
# revision_environment = false

# Set to 'true' to set timezone to UTC in migration file names
timezone = UTC

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Database URL (overridden by DATABASE_URL env variable in env.py)
# Format: postgresql+asyncpg://user:password@host:port/dbname
sqlalchemy.url = postgresql+asyncpg://localhost:5432/aegis_ir

# Version table name
version_table = alembic_version

# Version table schema (leave blank for default schema)
# version_table_schema =

[post_write_hooks]
# Hooks to run after generating a new migration revision
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
